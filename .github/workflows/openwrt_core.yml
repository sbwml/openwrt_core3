name: sync openwrt_core

on:
  workflow_dispatch:
  repository_dispatch:
    types: [sync]

permissions:
  contents: write

jobs:
  build:
    name: openwrt_core
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
    - name: checkout kmod branch
      uses: actions/checkout@main
      with:
        ref: kmod

    - name: setup environment
      run: |
        sudo timedatectl set-timezone 'Asia/Shanghai'
        rm -f commit_msg.txt

    - name: sync x86_64
      run: |
        OPENWRT_VERSION="25.12"
        TARGET_ENV="x86_64-6.18"
        BASE_PATH="$OPENWRT_VERSION/targets/x86/64"
        mkdir -p "$BASE_PATH"
        
        kmod=$(curl -sk "https://api.github.com/repos/sbwml/builder/releases/tags/openwrt-25.12" | grep "browser_download_url" | grep "$TARGET_ENV" | grep -v -- "-rc" | sort -V | tail -1 | awk '{print $2}' | sed 's/\"//g')
        if [ -n "$kmod" ]; then
          kmod_name=$(basename $kmod | sed 's/\.tar\.gz$//;s/^[^-]*-//')
          curl -L $kmod -o "$kmod_name.tar.gz" --progress-bar
          
          mkdir -p tmp_x86
          tar zxf "$kmod_name.tar.gz" -C tmp_x86
          
          INNER_NAME=$(ls tmp_x86 2>/dev/null | head -n 1)
          if [ -n "$INNER_NAME" ]; then
            DIR_PATH="$BASE_PATH/$INNER_NAME"
            if [ -d "$DIR_PATH" ]; then
              echo "x86_64 target version $INNER_NAME already exists. Skipping."
              rm -rf tmp_x86 "$kmod_name.tar.gz"
            else
              mv "tmp_x86/$INNER_NAME" "$DIR_PATH"
              rm -rf tmp_x86 "$kmod_name.tar.gz"
              
              if [ -n "$(git status --porcelain "$DIR_PATH")" ]; then
                echo "x86_64($INNER_NAME)" >> commit_msg.txt
              fi
            fi
          else
            rm -rf tmp_x86 "$kmod_name.tar.gz"
          fi
        fi

    - name: sync armsr-armv8
      run: |
        OPENWRT_VERSION="25.12"
        TARGET_ENV="armv8-6.18"
        BASE_PATH="$OPENWRT_VERSION/targets/armsr/armv8"
        mkdir -p "$BASE_PATH"
        
        kmod=$(curl -sk "https://api.github.com/repos/sbwml/builder/releases/tags/openwrt-25.12" | grep "browser_download_url" | grep "$TARGET_ENV" | grep -v -- "-rc" | sort -V | tail -1 | awk '{print $2}' | sed 's/\"//g')
        if [ -n "$kmod" ]; then
          kmod_name=$(basename $kmod | sed 's/\.tar\.gz$//;s/^[^-]*-//')
          curl -L $kmod -o "$kmod_name.tar.gz" --progress-bar
          
          mkdir -p tmp_armsr
          tar zxf "$kmod_name.tar.gz" -C tmp_armsr
          
          INNER_NAME=$(ls tmp_armsr 2>/dev/null | head -n 1)
          if [ -n "$INNER_NAME" ]; then
            DIR_PATH="$BASE_PATH/$INNER_NAME"
            if [ -d "$DIR_PATH" ]; then
              echo "armsr target version $INNER_NAME already exists. Skipping."
              rm -rf tmp_armsr "$kmod_name.tar.gz"
            else
              mv "tmp_armsr/$INNER_NAME" "$DIR_PATH"
              rm -rf tmp_armsr "$kmod_name.tar.gz"
              
              if [ -n "$(git status --porcelain "$DIR_PATH")" ]; then
                echo "armsr($INNER_NAME)" >> commit_msg.txt
              fi
            fi
          else
            rm -rf tmp_armsr "$kmod_name.tar.gz"
          fi
        fi

    - name: sync rockchip (aarch64_generic)
      run: |
        OPENWRT_VERSION="25.12"
        TARGET_ENV="aarch64-6.18"
        BASE_PATH="$OPENWRT_VERSION/targets/rockchip/armv8"
        mkdir -p "$BASE_PATH"
        
        kmod=$(curl -sk "https://api.github.com/repos/sbwml/builder/releases/tags/openwrt-25.12" | grep "browser_download_url" | grep "$TARGET_ENV" | grep -v -- "-rc" | sort -V | tail -1 | awk '{print $2}' | sed 's/\"//g')
        if [ -n "$kmod" ]; then
          kmod_name=$(basename $kmod | sed 's/\.tar\.gz$//;s/^[^-]*-//')
          curl -L $kmod -o "$kmod_name.tar.gz" --progress-bar
          
          mkdir -p tmp_rockchip
          tar zxf "$kmod_name.tar.gz" -C tmp_rockchip
          
          INNER_NAME=$(ls tmp_rockchip 2>/dev/null | head -n 1)
          if [ -n "$INNER_NAME" ]; then
            DIR_PATH="$BASE_PATH/$INNER_NAME"
            if [ -d "$DIR_PATH" ]; then
              echo "rockchip target version $INNER_NAME already exists. Skipping."
              rm -rf tmp_rockchip "$kmod_name.tar.gz"
            else
              mv "tmp_rockchip/$INNER_NAME" "$DIR_PATH"
              rm -rf tmp_rockchip "$kmod_name.tar.gz"
              
              if [ -n "$(git status --porcelain "$DIR_PATH")" ]; then
                echo "rockchip($INNER_NAME)" >> commit_msg.txt
              fi
            fi
          else
            rm -rf tmp_rockchip "$kmod_name.tar.gz"
          fi
        fi

    - name: Git push to kmod branch
      run: |
        git config --local user.name "gitea-action"
        git config --local user.email "git@cooluc.com"
        
        python generate_index.py
        
        git add 25.12/
        
        if [ -n "$(git status --porcelain)" ]; then
          if [ -f commit_msg.txt ]; then
            CHANGED_ARCHS=$(paste -sd, commit_msg.txt)
            COMMIT_MSG="sync core: $CHANGED_ARCHS"
          else
            COMMIT_MSG="sync core: update index"
          fi
          rm -f commit_msg.txt
          git add .
          git commit -sm "$COMMIT_MSG"
          git push "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" HEAD:kmod
        else
          echo "No changes detected. Skipping push."
        fi
